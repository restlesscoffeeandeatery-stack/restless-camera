<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Absensi Restless</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6c63ff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Absensi Restless">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:sans-serif}
#videoWrap{position:fixed;inset:0;background:#111}
#video{width:100%;height:100%;object-fit:cover;display:block;transform:scaleX(-1)}
#guide{position:fixed;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:center}
.oval{width:58vw;max-width:220px;aspect-ratio:3/4;border:2.5px solid rgba(255,255,255,.55);border-radius:50%}
#topBar{position:fixed;top:0;left:0;right:0;z-index:10;padding:16px;
  background:linear-gradient(rgba(0,0,0,.75),transparent);
  display:flex;align-items:center;gap:12px}
#btnBack{background:rgba(255,255,255,.2);border:none;border-radius:50%;
  width:40px;height:40px;color:#fff;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
#topTitle{color:#fff;font-size:15px;font-weight:600;flex:1}
#btnFlip{background:rgba(255,255,255,.2);border:none;border-radius:50%;
  width:40px;height:40px;color:#fff;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
#bottomBar{position:fixed;bottom:0;left:0;right:0;z-index:10;
  padding:20px 20px 36px;
  background:linear-gradient(transparent,rgba(0,0,0,.75));
  display:flex;align-items:center;justify-content:center}
#btnShutter{width:78px;height:78px;border-radius:50%;border:5px solid #fff;
  background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;
  font-size:32px;cursor:pointer;transition:transform .12s;touch-action:manipulation}
#btnShutter:active{transform:scale(.88)}
#statusBar{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;
  color:#fff;font-size:14px;text-align:center;background:rgba(0,0,0,.8);
  padding:16px 24px;border-radius:12px;display:none;max-width:85vw;line-height:1.7;
  white-space:pre-line}
#errScreen{position:fixed;inset:0;z-index:30;background:#0d0d14;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  padding:28px;text-align:center;gap:14px}
#errMsg{color:#e2e8f0;font-size:14px;line-height:1.7;white-space:pre-line;margin-top:8px}
.eBtn{padding:14px 28px;border-radius:10px;border:none;font-size:15px;
  font-weight:600;cursor:pointer;touch-action:manipulation;width:100%;max-width:280px}
.eBtn-primary{background:linear-gradient(135deg,#6c63ff,#a78bfa);color:#fff;margin-top:4px}
.eBtn-ghost{background:transparent;border:1px solid rgba(255,255,255,.25);color:#e2e8f0;margin-top:6px}
#prevScreen{position:fixed;inset:0;z-index:30;background:#000;
  display:none;flex-direction:column;align-items:center;justify-content:center}
#prevImg{max-width:100%;max-height:72vh;object-fit:contain}
#prevBar{position:fixed;bottom:0;left:0;right:0;
  padding:16px 16px 32px;background:linear-gradient(transparent,rgba(0,0,0,.9));
  display:flex;gap:12px}
.pBtn{flex:1;padding:15px;border-radius:10px;border:none;
  font-size:15px;font-weight:600;cursor:pointer;touch-action:manipulation}
.pBtn-ok{background:linear-gradient(135deg,#6c63ff,#a78bfa);color:#fff}
.pBtn-re{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25)}
#doneScreen{position:fixed;inset:0;z-index:40;background:#0d0d14;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  padding:28px;text-align:center;gap:16px}
canvas{display:none}
</style>
</head>
<body>

<div id="videoWrap">
  <video id="video" autoplay playsinline muted webkit-playsinline></video>
</div>
<div id="guide"><div class="oval"></div></div>
<div id="topBar">
  <button id="btnBack" onclick="goBack()">←</button>
  <div id="topTitle">📸 Foto Selfie</div>
  <button id="btnFlip" onclick="flipCam()">🔄</button>
</div>
<div id="bottomBar">
  <button id="btnShutter" onclick="snap()">📷</button>
</div>
<div id="statusBar"></div>
<div id="errScreen">
  <div style="font-size:52px">📵</div>
  <div id="errMsg"></div>
  <button class="eBtn eBtn-primary" onclick="retryCamera()">🔄 Coba Lagi</button>
  <button class="eBtn eBtn-ghost" onclick="goBack()">← Kembali</button>
</div>
<div id="prevScreen">
  <img id="prevImg" src="" alt="preview">
  <div id="prevBar">
    <button class="pBtn pBtn-re" onclick="retake()">🔄 Ulang</button>
    <button class="pBtn pBtn-ok" onclick="useFoto()">✅ Gunakan</button>
  </div>
</div>
<div id="doneScreen">
  <div style="font-size:64px">✅</div>
  <div style="color:#e2e8f0;font-size:18px;font-weight:600">Foto Terkirim!</div>
  <div style="color:#64748b;font-size:14px;line-height:1.6">
    Kembali ke tab absensi.<br>Absensi akan otomatis melanjutkan.
  </div>
  <a id="btnKembali" href="#"
     style="margin-top:8px;padding:14px 28px;
     background:linear-gradient(135deg,#6c63ff,#a78bfa);color:#fff;
     border-radius:10px;text-decoration:none;font-weight:600;font-size:15px">
    ← Kembali ke Absensi
  </a>
</div>
<canvas id="canvas"></canvas>

<script>
var stream = null;
var facing = 'user';
var photoData = null;

// Baca parameter dari URL
var params = {};
try {
  var search = window.location.search.substring(1);
  search.split('&').forEach(function(p) {
    var kv = p.split('=');
    if (kv[0]) params[kv[0]] = decodeURIComponent(kv[1] || '');
  });
} catch(e) {}

var SESSION_ID  = params.sid || '';
var WEBAPP_URL  = params.url || '';
var RETURN_URL  = params.ret || '';

if (params.title) document.getElementById('topTitle').textContent = params.title;
if (RETURN_URL) document.getElementById('btnKembali').href = RETURN_URL;

startCam();

function startCam() {
  showStatus('Membuka kamera...');
  hideErr();
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showErr('Browser tidak mendukung kamera.\nGunakan Chrome versi terbaru.');
    return;
  }
  tryGetCamera({ video: { facingMode: facing, width:{ideal:1280}, height:{ideal:960} }, audio: false });
}

function tryGetCamera(c) {
  navigator.mediaDevices.getUserMedia(c)
    .then(gotStream)
    .catch(function(e) {
      if (c.video && c.video.width) {
        tryGetCamera({ video: { facingMode: facing }, audio: false });
      } else if (c.video && c.video.facingMode) {
        tryGetCamera({ video: true, audio: false });
      } else {
        handleErr(e);
      }
    });
}

function gotStream(s) {
  stream = s;
  var v = document.getElementById('video');
  v.srcObject = s;
  v.style.transform = facing === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
  v.onloadedmetadata = function() { v.play().catch(function(){}); hideStatus(); };
  setTimeout(function() { if (v.paused) { v.play().catch(function(){}); hideStatus(); } }, 1500);
}

function handleErr(err) {
  var msg = '';
  if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
    msg = 'Izin kamera ditolak.\n\nCara mengizinkan:\n1. Tap ikon 🔒 di address bar\n2. Tap "Izin situs"\n3. Kamera → pilih "Izinkan"\n4. Tap Coba Lagi';
  } else if (err.name === 'NotFoundError') {
    msg = 'Kamera tidak ditemukan.';
  } else if (err.name === 'NotReadableError') {
    msg = 'Kamera sedang dipakai aplikasi lain.\nTutup aplikasi lain lalu tap Coba Lagi.';
  } else {
    msg = 'Kamera gagal dibuka.\n(' + (err.name||'') + ')';
  }
  showErr(msg);
}

function flipCam() {
  facing = facing === 'user' ? 'environment' : 'user';
  stopStream(); startCam();
}

function snap() {
  var v = document.getElementById('video');
  if (!stream || v.readyState < 2 || v.videoWidth === 0) {
    showStatus('⏳ Kamera belum siap...');
    setTimeout(hideStatus, 1500);
    return;
  }
  var c = document.getElementById('canvas');
  c.width = v.videoWidth; c.height = v.videoHeight;
  var ctx = c.getContext('2d');
  if (facing === 'user') { ctx.translate(c.width,0); ctx.scale(-1,1); }
  ctx.drawImage(v,0,0);
  photoData = c.toDataURL('image/jpeg', 0.82);
  stopStream();
  document.getElementById('prevImg').src = photoData;
  document.getElementById('prevScreen').style.display = 'flex';
}

function retake() {
  photoData = null;
  document.getElementById('prevScreen').style.display = 'none';
  startCam();
}

function uploadFotoChunked(sessionId, webAppUrl, photo, callback) {
  // Coba kirim via Image request (selalu berhasil lintas domain)
  // Foto di-encode dan dikirim via URL parameter ke Apps Script doGet
  // Apps Script akan deteksi parameter 'upload' dan simpan ke cache
  
  // Kompres dulu agar URL tidak terlalu panjang
  var canvas = document.getElementById('canvas');
  
  // Coba metode 1: fetch dengan no-cors
  try {
    fetch(webAppUrl, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({ sessionId: sessionId, photo: photo })
    })
    .then(function() {
      // no-cors selalu resolve (tidak bisa cek response)
      // Anggap berhasil, polling di Apps Script akan konfirmasi
      callback(true);
    })
    .catch(function() { callback(false); });
  } catch(e) {
    callback(false);
  }
}

function useFoto() {
  if (!photoData || !SESSION_ID || !WEBAPP_URL) {
    showStatus('❌ Data tidak lengkap.\nSID: ' + SESSION_ID + '\nURL: ' + (WEBAPP_URL ? 'OK' : 'kosong'));
    return;
  }

  document.getElementById('prevScreen').style.display = 'none';
  showStatus('📤 Mengirim foto...');

  // Upload foto ke Apps Script
  // Pakai no-cors karena Apps Script tidak support CORS dari domain luar
  // Data dikirim via GET parameter (foto di-split jadi chunks karena URL limit)
  // Alternatif: kirim via form POST
  uploadFotoChunked(SESSION_ID, WEBAPP_URL, photoData, function(ok) {
    if (ok) {
      hideStatus();
      document.getElementById('doneScreen').style.display = 'flex';
    } else {
      // Fallback: coba no-cors fetch
      fetch(WEBAPP_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ sessionId: SESSION_ID, photo: photoData })
      })
      .then(function() {
        hideStatus();
        document.getElementById('doneScreen').style.display = 'flex';
      })
      .catch(function(err) {
        showStatus('❌ Gagal kirim foto.\nCoba ambil ulang atau hubungi admin.\n(' + err.message + ')');
      });
    }
  });
}

function goBack() {
  stopStream();
  if (RETURN_URL) window.location.href = RETURN_URL;
  else window.close();
}

function retryCamera() { hideErr(); startCam(); }

function stopStream() {
  if (stream) { stream.getTracks().forEach(function(t){ t.stop(); }); stream = null; }
  var v = document.getElementById('video');
  if (v) v.srcObject = null;
}

function showStatus(msg) {
  var el = document.getElementById('statusBar');
  el.textContent = msg; el.style.display = 'block';
}
function hideStatus() { document.getElementById('statusBar').style.display = 'none'; }
function showErr(msg) {
  hideStatus();
  document.getElementById('errMsg').textContent = msg;
  document.getElementById('errScreen').style.display = 'flex';
}
function hideErr() { document.getElementById('errScreen').style.display = 'none'; }
</script>

<!-- PWA Install Banner -->
<div id="installBanner" style="display:none;position:fixed;bottom:0;left:0;right:0;
  z-index:100;background:#1e1e2e;border-top:1px solid #2a2a3e;
  padding:14px 16px;display:none;align-items:center;gap:12px">
  <img src="icon-192.png" style="width:40px;height:40px;border-radius:10px;flex-shrink:0">
  <div style="flex:1">
    <div style="color:#e2e8f0;font-size:14px;font-weight:600">Install Absensi Restless</div>
    <div style="color:#64748b;font-size:12px">Tambahkan ke layar utama HP</div>
  </div>
  <button onclick="installPWA()" style="background:linear-gradient(135deg,#6c63ff,#a78bfa);
    color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;
    font-weight:600;cursor:pointer;white-space:nowrap">Install</button>
  <button onclick="dismissInstall()" style="background:transparent;border:none;
    color:#64748b;font-size:18px;cursor:pointer;padding:4px">✕</button>
</div>

<script>
// Register Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/restless-camera/sw.js')
      .then(function(reg) { console.log('SW registered'); })
      .catch(function(err) { console.log('SW error:', err); });
  });
}

// PWA Install Prompt
var deferredPrompt = null;
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredPrompt = e;
  // Tampilkan banner install setelah 3 detik
  setTimeout(function() {
    var banner = document.getElementById('installBanner');
    if (banner) banner.style.display = 'flex';
  }, 3000);
});

function installPWA() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(function(result) {
    deferredPrompt = null;
    dismissInstall();
  });
}

function dismissInstall() {
  var banner = document.getElementById('installBanner');
  if (banner) banner.style.display = 'none';
}

// iOS — tidak ada beforeinstallprompt, tampilkan instruksi manual
var isIOS = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
var isInStandalone = window.navigator.standalone === true;
if (isIOS && !isInStandalone) {
  setTimeout(function() {
    var banner = document.getElementById('installBanner');
    if (banner) {
      banner.style.display = 'flex';
      banner.querySelector('button[onclick="installPWA()"]').textContent = 'Cara Install';
      banner.querySelector('button[onclick="installPWA()"]').onclick = function() {
        alert('Cara install di iPhone/iPad:\n\n1. Tap ikon Share (kotak dengan panah atas) di browser\n2. Pilih "Add to Home Screen"\n3. Tap "Add"');
      };
    }
  }, 3000);
}
</script>
</body>
</html>
